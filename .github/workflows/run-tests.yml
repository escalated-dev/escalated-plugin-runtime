name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Clone and build plugin-sdk dependency
        run: |
          git clone --depth 1 https://github.com/escalated-dev/escalated-plugin-sdk.git /tmp/plugin-sdk
          cd /tmp/plugin-sdk && npm ci && npm run build

      - run: npm ci
      - run: npm install /tmp/plugin-sdk
      - run: npm run build
      - run: npx tsx --test $(find tests -name '*.test.ts')
